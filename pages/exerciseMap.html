<head>

    <link rel="stylesheet" href="/styles/pageTheme.css">
    <link rel="stylesheet" href="/styles/fonts.css">
    <link rel="stylesheet" href="/styles/exerciseMap.css">
    <link rel="stylesheet" href="/styles/modalPanel.css">
    <link rel="icon" type="image/png" href="/data/images/interestImages/webIcon.png"/>
    <script src="/global.js"></script>
    <title>Exercise Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>

    <script defer src="/scripts/pageScript/exerciseMap.js"></script>
</head>
<body>
    <header>
        <h1>Exercise Map</h1>
        <h2>Tracking my running and cycling across Sweden.</h2>
        <nav><ul>
            <li><a href="/pages/algorithmsVisualized.html"><u>Algorithms</u></a></li>
            <li><a href="/index.html"><u>Home</u></a></li>
            <li><a href="/pages/projects.html"><u>Projects</u></a></li>
            <li><a aria-disabled="true" href="javascript:void(0)" onmouseover="this.style.cursor='default';">Exercise Map</a></li>
        </ul></nav>
    </header>
    <main style="margin-top: 8vh">
        <!-- Toggle buttons to switch between Running and Biking -->
        <div id="mode-toggle">
            <button id="btn-running" class="toggle-btn" onclick="switchMode('running')">
                Running
            </button>
            <button id="btn-biking" class="toggle-btn active" onclick="switchMode('biking')">
                Biking
            </button>
        </div>
        <div id="map" class="modal-content"></div>
    </main>
    <footer>
        <p class="side-by-side" id="footerLastUpdated"></p>
        <p class="side-by-side"><a href="https://github.com/BenjaminTWP/BenjaminTWP.github.io/activity" rel="noopener" target="_blank">GitHub Activity</a></p>
    </footer>
    <script id="index-functionality">
        document.getElementById("footerLastUpdated").innerText = "Last updated " + LAST_UPDATE + ".";
    </script>
</body>
</html>
